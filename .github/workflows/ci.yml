name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: python -m pip install -U pip && python -m pip install -r requirements.txt
      - name: Backend import smoke
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///./ci_smoke.db
        run: python -c "import main; print('import-ok')"
      - name: Migration smoke (alembic upgrade head)
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///./ci_migrate.db
        run: alembic upgrade head
      - name: Migration drift check (alembic check)
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///./ci_migrate.db
        run: python -m alembic check
      - name: Compileall
        run: python -m compileall .
      - name: Run backend tests
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
        run: python -m pytest -q
      - name: Pip dependency check
        run: python -m pip check
      - name: Seed demo data reset smoke
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
        run: python seed_data.py --reset

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:run
      - name: Build
        run: npm run build
      - name: Audit
        run: npm audit --audit-level=moderate

  backend-runtime-compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install backend deps
        run: python -m pip install -U pip && python -m pip install -r requirements.txt
      - name: Runtime and migration smoke
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///./compat_${{ matrix.python-version }}.db
        run: |
          python -m pytest -q tests/test_config.py tests/test_stock_holding_migration.py
          python -m alembic upgrade head

  frontend-node22-compat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Node and E2E config smoke
        run: npm run check:node && npm run test:e2e-config
      - name: Build
        run: npm run build

  e2e-seeded-demo:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend deps
        working-directory: backend
        run: python -m pip install -U pip && python -m pip install -r requirements.txt
      - name: Install frontend deps
        run: npm ci
      - name: Validate E2E isolation config
        run: npm run test:e2e-config
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Seeded demo Playwright smoke
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
        run: npm run e2e:seeded
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore

