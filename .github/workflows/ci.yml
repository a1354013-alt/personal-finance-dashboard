name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: python -m pip install -U pip && python -m pip install -r requirements.txt
      - name: Backend import smoke
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///./ci_smoke.db
        run: python -c "import main; print('import-ok')"
      - name: Migration smoke (alembic upgrade head)
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
          DATABASE_URL: sqlite:///./ci_migrate.db
        run: alembic upgrade head
      - name: Compileall
        run: python -m compileall .
      - name: Run backend tests
        env:
          ENV: development
          SECRET_KEY: ci-secret-key
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

